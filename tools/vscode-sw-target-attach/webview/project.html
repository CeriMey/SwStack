<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; img-src {{cspSource}} data:; style-src {{cspSource}} 'unsafe-inline'; script-src 'nonce-{{nonce}}';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="{{cssUri}}" rel="stylesheet" />
    <title>coreSw Project</title>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="title">Project</div>
        <div class="spacer"></div>
        <button id="btnNewProject" class="btn secondary">New project…</button>
        <button id="btnNewLaunch" class="btn secondary">New launch.json</button>
        <button id="btnDoctor" class="btn secondary">Diagnostics</button>
        <button id="btnDashboard" class="btn secondary">Dashboard</button>
        <button id="btnOutput" class="btn secondary">Output</button>
        <button id="btnRefresh" class="btn">Refresh</button>
      </header>

      <div class="layout">
        <aside class="pane left">
          <div class="paneHeader">
            <div class="paneTitle">Launch JSON</div>
            <div id="launcherCount" class="muted"></div>
          </div>
          <div class="paneTools">
            <input id="launcherFilter" class="input" type="text" placeholder="Filter…" />
          </div>
          <div id="launcherList" class="list"></div>
        </aside>

        <main class="pane right">
          <div id="details" class="details">
            <div class="muted">Select a launch file.</div>
          </div>
        </main>
      </div>

      <div id="status" class="status"></div>
    </div>

    <script nonce="{{nonce}}" src="{{jsUri}}"></script>
  </body>
</html>
